name: readiness-gate

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate enterprise readiness baseline
        run: |
          python scripts/validate_readiness.py
