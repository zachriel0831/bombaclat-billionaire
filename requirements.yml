  # ── 模組：Market Watch ──────────────────────────────────────────────
  - id: REQ-024
    title: "[交易訊號] 從 market_analysis 拆出推薦股 signal"
    module: market_watch
    status: done
    trigger: schedule
    priority: high
    description: |
      目標：把 t_market_analyses.structured_json 內的台股推薦名單拆成獨立交易訊號表，
      讓後續 review、risk gate、decision、outcome 可以各自獨立追蹤。

      已實作資料表：
        - t_trade_signals：
          analysis_id、analysis_date、analysis_slot、market、ticker、name、signal_type、
          strategy_type、direction、confidence、entry_zone、invalidation、take_profit_zone、
          holding_horizon、rationale、risk_notes、source_event_ids、status、idempotency_key、raw_json
        - t_signal_reviews：
          signal_id、review_type、status、reviewer、reason、risk_score、failed_rules、raw_json
        - t_signal_outcomes：
          signal_id、status、evaluated_at、entry_hit、stop_hit、target_hit、return_pct、
          max_drawdown_pct、outcome_json

      邊界：
        - LLM 只產生 signal，不直接下單
        - review / risk gate 必須獨立
        - 每個 signal 都有 idempotency_key，避免重複處理
        - 每個 signal 可回指原始 analysis 與 source_event_ids
        - outcome 必須回寫，供後續評估模型品質
    depends_on: [REQ-022]
    acceptance:
      - market_analysis 寫入 t_market_analyses 後會抽出 stock_watch / trade_ideas 到 t_trade_signals
      - 只保留台股標的，非台股 signal 會略過
      - 重跑同一 analysis 時用 signal_key / idempotency_key 去重
      - 同一 analysis 舊的 pending/new/watch signal 會標成 superseded
      - t_signal_reviews 與 t_signal_outcomes 已建表，但不與下單耦合
      - 新增 backfill script 可從既有 t_market_analyses 補寫 t_trade_signals
      - 新增單元測試覆蓋解析、去重、非台股略過、market_analysis 寫入路徑
    notes: |
      2026-04-26 已完成。這條取代原先 watchlist 版本，先建立「分析結果 -> 可審核交易訊號」鏈路。
