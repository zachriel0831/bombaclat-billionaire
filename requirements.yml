# ── 任務狀態機 ────────────────────────────────────────────
# pending   → 等待依賴滿足或人工觸發
# ready     → 依賴已滿足，可派出
# running   → Code session 已啟動，執行中
# review    → 完成，等待人工審核（或自動驗收）
# done      → 驗收通過，關閉
# failed    → 執行失敗，等待 retry 或人工介入
# blocked   → 手動暫停，不自動派出

# ── 觸發條件（trigger） ──────────────────────────────────
# manual      → 只有你說「跑這個」才執行
# auto        → 依賴滿足後立即自動派出
# schedule    → 排程觸發（搭配 cron）
# on_merge    → 指定 branch/PR 合入後觸發（需 webhook 或輪詢 git log）
# on_data     → MySQL / 檔案出現新資料後觸發

