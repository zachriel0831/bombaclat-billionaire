        1. GET /health - healthcheck
        2. POST /webhook - LINE webhook 接收，驗 X-Line-Signature (HMAC-SHA256)，
           解析 join/leave/message/follow/unfollow 事件，先只 log 不寫 DB
        3. LinePushClient service - push(targetId, text) / multicast(targetIds, text)
        4. 設定走環境變數 (LINE_CHANNEL_SECRET, LINE_CHANNEL_ACCESS_TOKEN)
        5. README + .env.example + .gitignore
      此階段不含 DB 連線、dispatcher、queue 表。
    depends_on: []
    acceptance:
      - 專案位於 D:\work_space\claude-box\workspace\line-relay-service 且為獨立 git repo  # done (commit fcdfc93)
      - ./mvnw spring-boot:run 可啟動服務                                                   # pending：需先裝 JDK 21
      - /health 回 200                                                                      # pending：需先啟動服務
      - ngrok/cloudflared 暴露後，LINE Console webhook 測試成功（log 顯示事件）              # pending：需先啟動服務
      - 手動呼叫 LinePushClient.push() 能成功推送訊息到指定 LINE 用戶/群組                   # pending：需先啟動服務
    notes: |
      2026-04-20 Phase 1 程式骨架 + 單元測試已完成並 commit (fcdfc93)。
