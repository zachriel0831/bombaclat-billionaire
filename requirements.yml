  - id: REQ-028
    title: "[券商接入] 真實 broker adapter、對帳、錯單保護與回滾機制"
    module: order_execution
    status: pending
    trigger: manual
    priority: high
    description: |
      目標：在 REQ-027 的 paper trading 穩定後，再接真實券商 API，並補齊 production 級保護。

      範圍：
        1. broker adapter：
           - auth、下單、撤單、改單、查詢委託、查詢成交、查詢庫存
        2. reconciliation：
           - 盤中與日終對帳，比對 broker 狀態與本地 orders / fills / positions
        3. 保護：
           - 最大日損失、最大部位、最大未成交筆數、同 symbol 冷卻時間、錯單 kill switch
        4. incident handling：
           - API timeout / duplicate submit / callback 遺失 / 部分成交 / broker side reject
    depends_on: [REQ-027]
    acceptance:
      - 至少一個 broker adapter 以 sandbox 或正式測試環境完成連通
      - 有對帳 job，可偵測本地與券商狀態不一致
      - 有 kill switch，可立即阻止新單送出並標記系統狀態
      - 有 runbook：broker timeout、重送、防重、手動介入流程
      - 新增 integration tests / sandbox smoke tests 覆蓋 submit、cancel、replace、status sync
    notes: |
      2026-04-25 新列。真實券商接入必須晚於 paper trading 與風控閘門，不建議直接跳過。

  # ── 模組：Operations & Evaluation ───────────────────────────────────
  - id: REQ-029
    title: "[驗證與營運] 回測 / replay / 績效歸因 / 全鏈路觀測"
    module: operations_evaluation
    status: pending
    trigger: manual
    priority: medium
    description: |
      目標：讓這套系統不只是能跑，而是能被驗證、監控、調參與持續改進。

      範圍：
        1. replay/backtest：
           - 以歷史 t_relay_events、行情快照、analysis、watchlist trigger 重放決策流程
        2. paper trading evaluation：
           - 勝率、報酬率、最大回撤、平均持有時間、訊號命中率、analysis -> decision 轉換率
        3. 歸因：
           - 哪些來源事件、哪些策略模板、哪些風控規則最常帶來正/負貢獻
        4. observability：
           - 每一階段 latency、error rate、prompt/token 成本、broker error、push error、kill switch 狀態

      產出：
        - t_trade_performance_daily / t_strategy_performance / runtime dashboards / incident report template
    depends_on: [REQ-022, REQ-024, REQ-026, REQ-027]
    acceptance:
      - 能對指定日期區間做 replay，產出 signal / decision / order / pnl 結果
      - 至少有一份自動產出的策略績效日報或週報
      - 有端到端 trace id，可串起 event -> analysis -> signal -> decision -> order
      - 有最小觀測面板或匯總查詢腳本，可看 error / latency / pnl / broker sync 狀態
      - 補一份 incident / rollback runbook 於 memory-bank
    notes: |
      2026-04-25 新列。沒有 replay、績效與觀測，系統即使能下單，也很難安全迭代。
