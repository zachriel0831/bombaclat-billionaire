      - ./mvnw spring-boot:run 可啟動服務                                                   # pending：需先裝 JDK 21
      - /health 回 200                                                                      # pending：需先啟動服務
      - ngrok/cloudflared 暴露後，LINE Console webhook 測試成功（log 顯示事件）              # pending：需先啟動服務
      - 手動呼叫 LinePushClient.push() 能成功推送訊息到指定 LINE 用戶/群組                   # pending：需先啟動服務
    notes: |
