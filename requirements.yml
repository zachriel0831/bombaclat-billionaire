# Completed requirements are archived in requirements.done.yml

# ── 任務狀態機 ────────────────────────────────────────────
# pending   → 等待依賴滿足或人工觸發
# ready     → 依賴已滿足，可派出
# running   → Code session 已啟動，執行中
# review    → 完成，等待人工審核（或自動驗收）
# done      → 驗收通過，關閉
# failed    → 執行失敗，等待 retry 或人工介入
# blocked   → 手動暫停，不自動派出

# ── 觸發條件（trigger） ──────────────────────────────────
# manual      → 只有你說「跑這個」才執行
# auto        → 依賴滿足後立即自動派出
# schedule    → 排程觸發（搭配 cron）
# on_merge    → 指定 branch/PR 合入後觸發（需 webhook 或輪詢 git log）
# on_data     → MySQL / 檔案出現新資料後觸發

tasks:

  - id: REQ-016
    title: "[分析品質] Prompt caching + 靜態 skill 抽離，降低 token 消耗"
    status: pending
    trigger: manual
    priority: medium
    description: |
      現況：market_analysis._build_prompts() 每次 call 都把 macro skill + line format
      skill 整份塞進 system prompt，這兩段幾乎不變，卻每次都計費。

      目標：
        1. Claude：改用 Anthropic prompt caching（cache_control: ephemeral），把
           macro_skill + line_skill + 固定 evidence policy 標記為可快取 block，
           TTL 5 分鐘內連續多 slot / 多 stage 能吃到 cache。
        2. OpenAI：改走 Responses API 的 prompt caching（自動 prefix cache），
           確保固定內容放在 prompt 最前段，並量測 cached_tokens 比例。
        3. 抽出 src/event_relay/prompt_assets.py，集中管理不變的 system chunks
           與版本號，避免散落在各 stage 檔。
        4. 在 t_market_analyses.raw_json 記錄 prompt_tokens / cached_tokens / 成本估算。
    depends_on: [REQ-012]
    acceptance:
      - Claude 呼叫帶 cache_control，驗證第二次 call 的 cache_read_input_tokens > 0
      - OpenAI 呼叫記錄 cached_tokens，在 7 天樣本中平均 cache 命中率 > 60%
      - prompt_assets.py 集中管理靜態 chunk + 版本號
      - t_market_analyses.raw_json 新增 token_usage 欄位（prompt / completion / cached / est_cost_usd）
      - 新增 unit tests 驗證 cache_control 欄位出現在 Anthropic request payload
    notes: |
      2026-04-22 新列。缺省模型配置（market_analysis.py SLOTS / _resolve_market_*_settings）
      不動，僅換呼叫方式。Anthropic 至少 1024 tokens 才會快取，確認 skill 合併後長度
      足夠；若不足可加入固定的 evidence policy / few-shot examples 湊齊。

