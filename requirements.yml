  - id: REQ-009
    title: "[台股資金流] 官方資料源標準化寫入 t_relay_events"
    status: done
    trigger: manual
    priority: high
    description: |
      下一迭代補上台股早盤資金流資料包。所有資料先以 stored-only event 形式寫入
      t_relay_events，不直接寫入 t_market_analyses；早盤分析再從事件窗彙整後產出
      t_market_analyses。

      資料源以官方來源為主：
        1. TWSE：三大法人買賣超、外資持股、融資融券、借券/SBL、大盤/類股/跨市場行情。
        2. TPEx：上櫃三大法人、外資持股、融資融券、融券借券賣出餘額、OTC 指數/類股。
        3. TAIFEX：台指期/小台/選擇權未平倉、外資期貨淨部位、put/call 結構、大額交易人。

      事件設計方向：
        - source 使用 market_context:twse_flow / market_context:tpex_flow / market_context:taifex_flow。
        - raw_json 保留官方原始欄位、trade_date、normalized metrics、stored_only=true。
        - dedupe key 應包含 source family、trade_date、dataset、symbol 或 contract。
        - 不做 LINE 推送；Python 僅負責資料蒐集、事件寫庫與 AI 分析寫庫。
    depends_on: []
    acceptance:
      - 官方來源 endpoint 與欄位 mapping 已確認並記錄在 memory-bank 文件
      - TWSE / TPEx / TAIFEX adapters 可分別單獨執行並回傳 normalized event payload
      - 事件會寫入 t_relay_events，source 以 market_context: 開頭且 raw_json.stored_only=true
      - pre_tw_open 分析會讀取最近台股資金流事件，並在 prompt snapshot 中可追溯
      - 新增非網路 unit tests 覆蓋解析、dedupe key、空資料/錯誤處理
    notes: |
      2026-04-22 已完成實作：TWSE / TPEx / TAIFEX 官方資料已標準化為
      market_context:* stored-only events，可用來判斷外資現貨/期貨是否同向、
      上櫃是否跟上上市、融資是否追價、借券是否升高，以及選擇權 put/call
      結構是否偏防守。
      2026-04-25 補完正式驗收：
        - `event_relay.tw_market_flow`、`scripts/run_tw_market_flow.ps1`、`tests/test_tw_market_flow.py` 已在 repo
        - `.venv\Scripts\python.exe -m unittest discover -s tests -p "test_*.py" -v` 通過，含 `test_tw_market_flow`
        - 實跑 `scripts/run_tw_market_flow.ps1 -EnvFile .env` 成功，`stored=14`, `failures=0`
        - MySQL 查詢確認新寫入 row id `19634-19647`，source 分別為
          `market_context:twse_flow` / `market_context:tpex_flow` / `market_context:taifex_flow`
        - memory-bank 已記錄官方 endpoint/mapping 與決策：`PROJECT_DOCUMENTATION.md`、
