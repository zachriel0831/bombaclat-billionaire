      - 可配置 symbol override、黑名單、白名單、事件 blackout window
      - 新增單元測試覆蓋策略匹配優先級與 override 規則
      - 每筆決策能回溯用到哪一版 strategy 模板
    notes: |
      2026-04-25 新列。LLM 比較適合生成候選 thesis；真正的進出規則應固定在知識庫與規則層。

  - id: REQ-026
    title: "[決策引擎] trade signal -> risk check -> decision -> approval gate"
    module: decision_engine
    status: pending
    trigger: schedule
    priority: high
    description: |
      目標：把分析結果與監控事件轉成可執行但仍可控的交易決策。

      既有輸入：
        - t_trade_signals：
          由 REQ-024 建立，保存 analysis-derived candidate signals

      建議資料表：
        - t_trade_decisions：
          decision_id、signal_id、strategy_key、decision_status、reasoning_summary、risk_flags、
          approval_status、mode(manual/semi_auto/auto)、created_at
        - t_risk_limits：
          scope(global/strategy/symbol)、max_position_pct、max_daily_loss、max_open_orders、enabled

      決策流程：
        1. 讀取 pending_review t_trade_signals
        2. 套用策略知識庫與 symbol override
        3. 做風控檢查（曝險、黑名單、冷卻期、持倉衝突）
        4. 產生 decision
        5. 依模式決定是否需要人工批准才可轉成 order intent
    depends_on: [REQ-024, REQ-025]
    acceptance:
      - 建立 decision / risk limit schema 與基本 service
      - manual / semi_auto / auto 三種模式能分別控制是否需要人工批准
      - 每筆 decision 都保存理由、命中策略、風控結果、approval 狀態
      - 有全域 kill switch 與 per-symbol 停用機制
      - 新增單元測試覆蓋 risk reject、approval required、duplicate decision suppression
    notes: |
      2026-04-25 新列。這條的關鍵是把候選 signal 轉成有風控與審批邊界的 decision，而不是直接下單。
      2026-04-26 調整：t_trade_signals 已由 REQ-024 建立，REQ-026 只負責 risk / decision layer。

