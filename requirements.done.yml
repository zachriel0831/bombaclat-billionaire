  - id: REQ-012
    title: "[分析品質] 多階段分析 pipeline（事件解讀 → 影響傳導 → 台股映射 → 風險）"
    status: done
    trigger: manual
    priority: high
    description: |
      現況：src/event_relay/market_analysis.py 在單一 LLM call 同時處理事件理解、
      因果推導、台股映射與風險提示，模型被迫走捷徑 → 深度不足、互相稀釋。

      目標：把 run_once() 改為多階段 chain：
        1. stage_event_digest：對 t_relay_events 視窗內事件做分類、重要性分級、
