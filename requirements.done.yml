  - id: REQ-010
    title: "[美國總經] BLS 官方數據標準化寫入 t_relay_events"
    status: done
    trigger: manual
    priority: high
    description: |
      下一迭代補上美國總經官方資料包，優先使用 U.S. Bureau of Labor Statistics
      Public Data API 取得 JSON time series。資料先以 stored-only event 形式寫入
      t_relay_events，不直接寫入 t_market_analyses；美股收盤與台股早盤分析再從
      事件窗彙整後產出 t_market_analyses。

      第一批指標：
        1. CPI：headline CPI、core CPI。
        2. PPI：headline PPI、core / final demand 相關序列。
        3. 就業：非農就業、失業率、勞動參與率。
        4. 薪資：平均時薪、平均週工時、薪資年增/月增。

      API 設計方向：
        - endpoint 使用 https://api.bls.gov/publicAPI/v2/timeseries/data/。
        - 支援 BLS_API_KEY；未設定 key 時保留 no-key / 低頻 fallback，避免配額與限制問題。
        - series id mapping 應集中設定，實作前需再次對照 BLS catalog / 官方文件。
        - source 使用 market_context:bls_macro。
        - raw_json 保留 series_id、period、periodName、year、value、footnotes、release metadata、
          normalized metrics、stored_only=true。
        - dedupe key 應包含 source family、series_id、year、period。
    depends_on: []
    acceptance:
