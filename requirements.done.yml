  # ── 自動交易系統（下一階段）────────────────────────────────────────────
  # 原則：
  #   1. Python 仍負責資料蒐集、事件寫庫、模型分析、監控、決策與交易執行中台。
  #   2. Java 仍負責 LINE webhook、群組/用戶管理、分析/通知推送。
  #   3. t_relay_events 保存來源事實與監控事件；t_market_analyses 僅保存模型分析結果。
  #   4. LLM 不可直接下單；必須先經過規則/風控/審批層形成 order intent。
  #
  # 模組分類（REQ-018 起）：
  #   - architecture_foundation：系統邊界、資料流、治理與安全閘門
  #   - data_ingestion：行情、新聞、人物監控與事件標準化
  #   - analysis_engine：交易導向分析輸出
  #   - delivery_java：Java 端訂閱、推送與 delivery log
  #   - market_watch：盤中 watchlist 與觸發監控
  #   - decision_engine：策略知識庫、signal、risk check、approval
  #   - order_execution：order intent、paper trading、broker adapter
  #   - operations_evaluation：replay、績效、觀測、incident/rollback

  # ── 模組：Architecture Foundation ────────────────────────────────────
  - id: REQ-018
    title: "[自動交易總體] Python / Java / Decision / Order 邊界與資料流定稿"
    module: architecture_foundation
    status: done
    trigger: manual
    priority: high
    description: |
      目標：先把自動交易系統的服務邊界、資料流、資料表責任與安全閘門定清楚，
      避免後續把 crawler、LINE、決策、下單邏輯混在一起。

      範圍：
        1. Python（本 repo）：
           - 蒐集新聞、社群、公告、行情與市場上下文
           - 將來源事實寫入 t_relay_events / 專用快照表
           - 產出 t_market_analyses（市場分析、交易候選、監控摘要）
           - 執行 watchlist 監控、決策產生與 order intent 建立
        2. Java（line-relay-service）：
           - 負責 LINE webhook、群組/用戶管理、訂閱偏好、推送紀錄、消息觸達
        3. Decision layer：
           - 管理策略知識庫、候選訊號、風控審批、模式切換（manual / semi-auto / auto）
        4. Order layer：
           - 對接券商 API、委託生命週期、成交回報、對帳與 kill switch

      強制原則：
        - 來源資料不可直接寫入 t_market_analyses，必須先成為 relay facts 或專用快照資料。
        - 模型不可直接產生 broker API 呼叫；只能先產生候選策略/決策建議。
        - 每一筆分析、決策、下單都必須可追溯回來源事件與 prompt/規則版本。
    depends_on: []
    acceptance:
      - 補一份 memory-bank 決策文件，明確定義 Python / Java / decision / order 四層邊界
      - 明確列出核心資料表與責任邊界：events / analyses / watchlist / decisions / orders / delivery logs
      - 定義三種運行模式：manual、semi_auto、auto，並有 enable/disable 開關
      - 定義全域停機開關（kill switch）與人工審批閘門，不允許 LLM 直連下單
      - 補充一份端到端流程圖：source event -> analysis -> watchlist -> decision -> order intent -> broker
    notes: |
      2026-04-25 新列。此條是後續所有自動交易功能的設計前置條件。
      若邊界未先定稿，後續很容易把 Java 觸達、Python 分析、下單中台耦合在一起。
      2026-04-25 進入 review：
        - 交付物：memory-bank/09-decisions/2026-04-25-auto-trading-system-boundaries.md
        - 文件涵蓋：四層邊界（Python data+analysis / Java delivery / decision / order）、
          18 張核心資料表的寫入 ownership 矩陣（含 t_analysis_delivery_logs 由 Java 寫）、
          三種運行模式 manual/semi_auto/auto + global_mode + strategy mode_override，
          四類 kill switch（global / per-symbol / broker connectivity），
          五個 LLM 不可繞過的 approval gate，
          end-to-end Mermaid 流程圖 + ASCII fallback
        - 六個強制不變式：facts before analysis / no-LLM-to-broker /
          default manual mode / kill switch 在 submission 點生效 /
          全鏈路 traceability / Java 獨佔 delivery
        - Non-goals 顯式列出：column-level schema、broker 選型、prompt cache、RAG，
          後續 REQ-019~029 個別處理
      2026-04-25 user review 通過，狀態改 done；
        REQ-019 起所有 PR 都必須引用本文件作為邊界依據。

